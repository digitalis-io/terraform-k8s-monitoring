name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.9.8"
  TOFU_VERSION: "1.9.1"
  TFLINT_VERSION: "v0.55.0"

jobs:
  # ── Format check ────────────────────────────────────────────────────────────
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check formatting
        run: terraform fmt -recursive -check

  # ── Lint ────────────────────────────────────────────────────────────────────
  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Lint modules
        run: |
          for dir in modules/*/; do
            echo "==> $dir"
            tflint --chdir="$dir"
          done

  # ── Validate (OpenTofu) ─────────────────────────────────────────────────────
  validate:
    name: tofu validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - modules/alloy
          - modules/cert-manager
          - modules/grafana-rules
          - modules/loki
          - modules/mimir
          - modules/otel-collector
          - modules/prometheus
          - modules/prometheus-rules
          - modules/pyroscope
          - modules/tempo
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Init ${{ matrix.module }}
        run: tofu -chdir=${{ matrix.module }} init -backend=false

      - name: Validate ${{ matrix.module }}
        run: tofu -chdir=${{ matrix.module }} validate

  # ── terraform-compliance (plan-level BDD) ──────────────────────────────────
  compliance:
    name: terraform-compliance
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Install terraform-compliance
        run: pip install terraform-compliance

      - name: Init alloy module
        run: tofu -chdir=modules/alloy init -backend=false

      - name: Plan — defaults fixture
        run: |
          tofu -chdir=modules/alloy plan \
            -var-file=../../tests/compliance/fixtures/defaults.tfvars \
            -out=plan-defaults.binary
          tofu -chdir=modules/alloy show -json plan-defaults.binary > /tmp/plan-defaults.json

      - name: Compliance — defaults
        run: terraform-compliance -f tests/compliance/features/alloy -p /tmp/plan-defaults.json

      - name: Plan — with ingress fixture
        run: |
          tofu -chdir=modules/alloy plan \
            -var-file=../../tests/compliance/fixtures/with_ingress.tfvars \
            -out=plan-ingress.binary
          tofu -chdir=modules/alloy show -json plan-ingress.binary > /tmp/plan-ingress.json

      - name: Compliance — with ingress
        run: terraform-compliance -f tests/compliance/features/alloy -p /tmp/plan-ingress.json

      - name: Plan — faro receiver fixture
        run: |
          tofu -chdir=modules/alloy plan \
            -var-file=../../tests/compliance/fixtures/faro_receiver.tfvars \
            -out=plan-faro.binary
          tofu -chdir=modules/alloy show -json plan-faro.binary > /tmp/plan-faro.json

      - name: Compliance — faro receiver
        run: terraform-compliance -f tests/compliance/features/alloy -p /tmp/plan-faro.json

      - name: Plan — sensitive-data custom rules fixture
        run: |
          tofu -chdir=modules/alloy plan \
            -var-file=../../tests/compliance/fixtures/sensitive_data_custom.tfvars \
            -out=plan-sensitive-data-custom.binary
          tofu -chdir=modules/alloy show -json plan-sensitive-data-custom.binary > /tmp/plan-sensitive-data-custom.json

      - name: Compliance — sensitive-data custom rules
        run: terraform-compliance -f tests/compliance/features/alloy -p /tmp/plan-sensitive-data-custom.json

      - name: Plan — sensitive-data disabled fixture
        run: |
          tofu -chdir=modules/alloy plan \
            -var-file=../../tests/compliance/fixtures/sensitive_data_disabled.tfvars \
            -out=plan-sensitive-data-disabled.binary
          tofu -chdir=modules/alloy show -json plan-sensitive-data-disabled.binary > /tmp/plan-sensitive-data-disabled.json

      - name: Compliance — sensitive-data disabled
        run: terraform-compliance -f tests/compliance/features/alloy -p /tmp/plan-sensitive-data-disabled.json

      # ── prometheus module ────────────────────────────────────────────────
      - name: Init prometheus module
        run: tofu -chdir=modules/prometheus init -backend=false

      - name: Plan — prometheus defaults fixture
        run: |
          tofu -chdir=modules/prometheus plan \
            -var-file=../../tests/compliance/fixtures/prometheus_defaults.tfvars \
            -out=plan-prom-defaults.binary
          tofu -chdir=modules/prometheus show -json plan-prom-defaults.binary > /tmp/plan-prom-defaults.json

      - name: Compliance — prometheus defaults
        run: terraform-compliance -f tests/compliance/features/prometheus -p /tmp/plan-prom-defaults.json

      - name: Plan — prometheus Grafana-only fixture
        run: |
          tofu -chdir=modules/prometheus plan \
            -var-file=../../tests/compliance/fixtures/prometheus_grafana_only.tfvars \
            -out=plan-prom-grafana-only.binary
          tofu -chdir=modules/prometheus show -json plan-prom-grafana-only.binary > /tmp/plan-prom-grafana-only.json

      - name: Compliance — prometheus Grafana-only
        run: terraform-compliance -f tests/compliance/features/prometheus -p /tmp/plan-prom-grafana-only.json

      - name: Plan — prometheus Grafana external DB (plaintext) fixture
        run: |
          tofu -chdir=modules/prometheus plan \
            -var-file=../../tests/compliance/fixtures/prometheus_grafana_db_plaintext.tfvars \
            -out=plan-prom-grafana-db.binary
          tofu -chdir=modules/prometheus show -json plan-prom-grafana-db.binary > /tmp/plan-prom-grafana-db.json

      - name: Compliance — prometheus Grafana external DB
        run: terraform-compliance -f tests/compliance/features/prometheus -p /tmp/plan-prom-grafana-db.json

      # ── grafana-rules ────────────────────────────────────────────────────
      - name: Init grafana-rules module
        run: tofu -chdir=modules/grafana-rules init -backend=false

      - name: Plan — grafana-rules slack fixture
        run: |
          tofu -chdir=modules/grafana-rules plan \
            -var-file=../../tests/compliance/fixtures/grafana_rules_slack.tfvars \
            -out=plan-grafana-rules.binary
          tofu -chdir=modules/grafana-rules show -json plan-grafana-rules.binary > /tmp/plan-grafana-rules.json

      - name: Compliance — grafana-rules contact-point Secret
        run: terraform-compliance -f tests/compliance/features/grafana-rules -p /tmp/plan-grafana-rules.json

      # ── cert-manager ─────────────────────────────────────────────────────
      - name: Init cert-manager module
        run: tofu -chdir=modules/cert-manager init -backend=false

      - name: Plan — cert-manager defaults fixture
        run: |
          tofu -chdir=modules/cert-manager plan \
            -var-file=../../tests/compliance/fixtures/cert_manager_defaults.tfvars \
            -out=plan-cert-manager-defaults.binary
          tofu -chdir=modules/cert-manager show -json plan-cert-manager-defaults.binary > /tmp/plan-cert-manager-defaults.json

      - name: Compliance — cert-manager defaults
        run: terraform-compliance -f tests/compliance/features/cert-manager -p /tmp/plan-cert-manager-defaults.json

      # ── Mimir ────────────────────────────────────────────────────────────
      - name: Init mimir module
        run: tofu -chdir=modules/mimir init -backend=false

      - name: Plan — mimir defaults fixture
        run: |
          tofu -chdir=modules/mimir plan \
            -var-file=../../tests/compliance/fixtures/mimir_defaults.tfvars \
            -out=plan-mimir-defaults.binary
          tofu -chdir=modules/mimir show -json plan-mimir-defaults.binary > /tmp/plan-mimir-defaults.json

      - name: Compliance — mimir defaults
        run: terraform-compliance -f tests/compliance/features/mimir -p /tmp/plan-mimir-defaults.json

  # ── Terratest (Go unit tests — no cluster required) ─────────────────────────
  terratest:
    name: terratest
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: test/go.mod
          cache-dependency-path: test/go.sum

      - name: Seed provider cache
        run: |
          mkdir -p /tmp/tf-plugin-cache
          for dir in modules/alloy modules/cert-manager modules/grafana-rules modules/loki modules/mimir modules/prometheus; do
            tofu -chdir="$dir" init -backend=false
          done
        env:
          TF_PLUGIN_CACHE_DIR: /tmp/tf-plugin-cache

      - name: Run Go tests
        working-directory: test
        run: go test -v -timeout 10m -parallel 1 ./...
        env:
          TF_CLI_ARGS: "-no-color"
          TF_PLUGIN_CACHE_DIR: /tmp/tf-plugin-cache
